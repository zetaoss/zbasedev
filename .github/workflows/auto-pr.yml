name: Auto PR

on:
  push:
    branches-ignore:
      - main
      - master

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  open-pr:
    name: Open PR on push
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if missing
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTO_PR_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            // Skip bot actors.
            if (context.actor.endsWith('[bot]')) {
              core.info('Skipping auto-pr for bot actor.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headBranch = context.ref.replace('refs/heads/', '');
            const base = context.payload.repository.default_branch;
            const head = `${owner}:${headBranch}`;

            // Check whether an open PR already exists for this head/base pair.
            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base,
              per_page: 1
            });

            if (existing.data.length > 0) {
              core.info(`Open PR already exists: #${existing.data[0].number}`);
              return;
            }

            // Use commit subject as PR title when available.
            const fallbackTitle = `Auto PR: ${headBranch}`;
            const commitMessage = context.payload.head_commit?.message ?? '';
            const prTitle = commitMessage.split('\n')[0].trim() || fallbackTitle;

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              head: headBranch,
              base,
              title: prTitle,
              body: [
                `This PR was automatically opened from branch \`${headBranch}\`.`,
                '',
                `- Triggered by: @${context.actor}`,
                `- Commit: ${context.sha}`
              ].join('\n'),
              maintainer_can_modify: true
            });

            core.info(`Created PR #${pr.data.number}`);

            // NOTE:
            // PRs created with GITHUB_TOKEN do not trigger pull_request workflows.
            // Use a PAT in AUTO_PR_TOKEN to allow downstream pull_request workflows.
            try {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: pr.data.number,
                assignees: [context.actor]
              });
              core.info(`Assigned ${context.actor} to PR #${pr.data.number}`);
            } catch (error) {
              // Keep this workflow non-blocking if assignment is not allowed.
              core.warning(`Unable to assign ${context.actor} to PR #${pr.data.number}: ${error.message}`);
            }
