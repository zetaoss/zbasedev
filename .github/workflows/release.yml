name: release
on:
  push:
    tags:
      - 'v*'

jobs:
  docker-push:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        uses: docker/metadata-action@v5
        id: meta_zbasedev
        with:
          images: |
            ghcr.io/zetaoss/zbasedev
          tags: |
            type=ref,event=tag

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            ZBASEDEV_VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta_zbasedev.outputs.tags }}
          labels: ${{ steps.meta_zbasedev.outputs.labels }}
          cache-from: type=gha,scope=zbasedev
          cache-to: type=gha,mode=max,scope=zbasedev
