name: Auto Assign

on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened]
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: auto-assign-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  assign-author:
    name: Assign author to issue/PR
    runs-on: ubuntu-latest
    steps:
      - name: Assign author
        uses: actions/github-script@v7
        with:
          script: |
            // Skip bot actors.
            if (context.actor.endsWith('[bot]')) {
              core.info('Skipping auto-assign for bot actor.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue?.number ?? context.payload.pull_request?.number;
            const author = context.payload.issue?.user?.login
              ?? context.payload.pull_request?.user?.login
              ?? context.actor;

            if (!issue_number) {
              core.info('No issue/PR number found. Skip.');
              return;
            }

            try {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number,
                assignees: [author]
              });
              core.info(`Assigned ${author} to #${issue_number}`);
            } catch (error) {
              // Keep this workflow non-blocking if assignment is not allowed.
              core.warning(`Unable to assign ${author} to #${issue_number}: ${error.message}`);
            }
